#mongodb - 优化生产配置
mongodb:
  uri: mongodb://10.7.1.165:9479
  username: admin
  password: hWCJ$HDajm9SN&&Z
  authSource: admin
  database: mergeHopeInter
  socketTimeout: 120 #套接字超时时间，单位秒 (优化为2分钟)
  maxPoolSize: 300 #连接池最大连接数 (提高并发能力)
  minPoolSize: 30 #连接池最小连接数 (增加最小连接数)
  maxIdleTime: 300 #连接最大空闲时间，单位秒 (5分钟)
  connectTimeout: 30 #连接超时时间，单位秒 (30秒)
  heartbeatFrequency: 10 #心跳频率，单位秒 (10秒检查)
  serverSelectionTimeout: 30 #服务器选择超时，单位秒 (30秒)
  maxConnecting: 100 #最大同时连接数 (增加并发连接)

