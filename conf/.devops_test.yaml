game: merge
cluster: test
module: socialserver
configDir: "../config"

etcd:
  - group: 1
    host: 172.20.4.73:2379
    username: NONE
    password: NONE

http:
  http_listen_addr: 0.0.0.0:19004
  http_read_timeout: 60000
  http_write_timeout: 60000
  http_idle_timeout: 60000
  enable_tls: false
  tls_cert_file: "../conf/server.crt"
  tls_key_file: "../conf/server.key"

rpc:
  server:
    address: "0.0.0.0:19104"
    enable_reflection: true
    keepalive_time: 10
    keepalive_timeout: 3
    enforcement_min_time: 5
  client:
    timeout: 3

logCfg:
  logLevel: info
  developMode: false

pprof:
  enabled: false
  addr: "0.0.0.0:19904"